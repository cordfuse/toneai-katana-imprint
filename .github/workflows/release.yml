name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build
        run: node src/build.js

      - name: Read version
        id: version
        run: echo "VERSION=$(cat version.txt)" >> "$GITHUB_OUTPUT"

      - name: Package release
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          REPO_NAME="${{ github.event.repository.name }}"
          cd dist
          zip -r "../${REPO_NAME}-v${VERSION}.zip" .

      # ToneAI Kat in Claude web and on a phone. SKILL.md + the compiled .tsl writer, in
      # one ZIP imported at claude.ai under Settings > Capabilities > Skills. No install,
      # no terminal. The sandbox runs the same writer the desktop app runs, so the bytes
      # are identical.
      - name: Package Claude Skill
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          cd dist-skill
          zip -r "../toneai-kat-skill-v${VERSION}.zip" .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            ### Claude web and mobile (Claude Skill) — START HERE

            **No terminal, no install, works on your phone.** The easiest way to use ToneAI Kat, and for most players the only one they'll need.

            **Download `toneai-kat-skill-v${{ steps.version.outputs.VERSION }}.zip`** from the Assets below.

            1. Go to **claude.ai in a web browser** and sign in. (Any plan, including Free. Make sure **code execution** is enabled in your settings — the skill needs it to run the generator.)
            2. Open **Skills** in your settings (**Customize → Skills**, or **Settings → Capabilities → Skills**).
            3. Click **Upload skill** and choose the ZIP. Don't unzip it first.
            4. Done. ToneAI Kat is now in **every** chat, on the web and in the Claude mobile app.

            > **Import from a browser.** The Claude mobile app has no way to add a custom skill — it does not surface the import screen. Do this once at claude.ai in a browser (a phone browser works). After that the skill is on your account and the mobile app picks it up like any other chat.

            Ask for a tone — *"dial in the Comfortably Numb solo, I'm on a KATANA MkII with a Les Paul"* — and it hands you a `.tsl` liveset to import with BOSS Tone Studio.

            It asks once which KATANA and what you play, then remembers.

            ### Desktop (agent CLI)

            Download `toneai-katana-imprint-v${{ steps.version.outputs.VERSION }}.zip`, extract it, and open the folder in an agent CLI (Claude Code, Gemini CLI, Codex, OpenCode). No install step — the `.tsl` writer ships compiled, with no dependencies.

            ---

            **The agent never writes a `.tsl` itself.** It designs the tone, then a deterministic writer turns that into the liveset. A patch the amp rejects is worse than no patch — see THE ONE RULE.

            Only the **KATANA MkII** is confirmed on real hardware. The other eight writers are built from the format and are very likely right, but nobody has put one into that amp yet. If you own one, load a patch and tell us — working or broken.
          files: |
            *-v*.zip
            dist/.imprint-checksum
